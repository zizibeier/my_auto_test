# pytest.ini
[pytest]
# 测试目录
testpaths = tests

# 测试文件匹配模式
python_files = test_*.py

# 测试类匹配模式
python_classes = Test*

# 测试方法匹配模式
python_functions = test_*

# 命令行选项
addopts =
    -v
    -s
    --strict-markers
    --tb=short
    --alluredir=allure-results

# 标记
markers =
    view: 视图操作测试
    measurement: 测量工具测试
    canvas: Canvas操作测试
    coverage: 覆盖问题测试
    performance: 性能测试
    workflow: 工作流测试
    slow: 慢速测试
    smoke: 冒烟测试